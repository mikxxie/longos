name: build longos

on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev file wget cpio unzip rsync bc

      - name: Cache Toolchain
        uses: actions/cache@v4
        with:
          path: output/host
          key: ${{ runner.os }}-toolchain-${{ hashFiles('defconfig') }}
          restore-keys: |
            ${{ runner.os }}-toolchain-

      - name: Build OS
        run: |
          cp defconfig .config
          make olddefconfig
          make

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: frutiger-aero-disk-image
          path: output/images/
